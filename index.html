<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <textarea name="" id="mainText" placeholder="type here"></textarea>
    <div class="count">
        char:<span id="charCount">0</span>
        words:<span id="wordsCount">0</span>
    </div>

    <script>
        document.getElementById("mainText").addEventListener("input",function(){
            const text=this.value;
        document.getElementById("charCount").innerText=text.length;

        const trimm=text.trim();
        const words=trimm === "" ? 0:trimm.split(/\s+/).length;
        document.getElementById("wordsCount").innerText=words;
        })
    </script>
</body>
</html>
